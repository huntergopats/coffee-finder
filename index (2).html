<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Coffee | The Golden Hopper</title>
<style>
  :root {
    --ink: #2b2622;
    --ink-soft: #6f655c;
    --paper: #faf7f2;
    --card: #ffffff;
    --line: rgba(43, 38, 34, 0.08);
    --gold: #b7792e;
    --gold-soft: #f3e6cf;
    --radius: 22px;
    --shadow: 0 10px 40px rgba(43, 38, 34, 0.08);
    --shadow-lift: 0 18px 60px rgba(43, 38, 34, 0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background:
      radial-gradient(1100px 600px at 12% -8%, #fdf3e3 0%, rgba(253,243,227,0) 55%),
      radial-gradient(900px 600px at 100% 110%, #f7e9f0 0%, rgba(247,233,240,0) 55%),
      linear-gradient(180deg, #faf7f2 0%, #f6f1e9 100%);
    background-attachment: fixed;
    min-height: 100vh;
  }
  body::before, body::after {
    content: "";
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.45;
    z-index: 0;
    pointer-events: none;
  }
  body::before { width: 320px; height: 320px; top: -80px; right: -60px; background: #f6cdd5; animation: drift1 19s ease-in-out infinite alternate; }
  body::after  { width: 360px; height: 360px; bottom: -120px; left: -80px; background: #d7ead0; animation: drift2 23s ease-in-out infinite alternate; }
  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(-34px, 44px); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(44px, -34px); } }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  .brand {
    text-align: center;
    margin-bottom: 34px;
  }
  .brand-mark {
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }
  .brand-tag {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.025em;
    margin-top: 8px;
    background: linear-gradient(110deg, #2b2622 0%, #6b4a26 55%, #b7792e 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .progress {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 44px;
  }
  .progress span {
    width: 38px;
    height: 4px;
    border-radius: 4px;
    background: var(--line);
    transition: background 0.4s ease;
  }
  .progress span.on { background: var(--gold); }

  .stage { position: relative; flex: 1; }

  .screen {
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.45s ease, transform 0.45s ease;
    pointer-events: none;
    position: absolute;
    inset: 0;
  }
  .screen.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
    position: relative;
  }

  .q-kicker {
    text-align: center;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 14px;
  }
  .q-title {
    text-align: center;
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 36px;
  }

  .options { display: flex; flex-direction: column; gap: 14px; }

  .opt {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 18px;
    box-shadow: var(--shadow);
    transition: transform 0.22s cubic-bezier(.2,.8,.2,1), box-shadow 0.22s ease, border-color 0.22s ease;
    text-align: left;
    position: relative;
    overflow: hidden;
    animation: popIn 0.5s cubic-bezier(.2,.8,.2,1) backwards;
  }
  .opt::after {
    content: "→";
    margin-left: auto;
    font-size: 20px;
    color: var(--ink-soft);
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  .opt:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lift);
    border-color: rgba(183, 121, 46, 0.45);
  }
  .opt:hover::after { opacity: 1; transform: translateX(0); }
  .opt:active { transform: translateY(-1px) scale(0.995); }

  .opt-dot {
    width: 50px; height: 50px;
    border-radius: 16px;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    font-size: 24px;
    transition: transform 0.22s cubic-bezier(.2,.8,.2,1);
  }
  .opt:hover .opt-dot { transform: scale(1.08) rotate(-4deg); }
  .opt-text { flex: 1; }
  .opt-label { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .opt-sub { font-size: 14px; color: var(--ink-soft); margin-top: 3px; }

  /* Result */
  .result { text-align: center; }
  .result-kicker {
    font-size: 13px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }
  .bag-halo {
    position: relative;
    width: 200px;
    margin: 0 auto 26px;
  }
  .bag-halo::before {
    content: "";
    position: absolute;
    inset: -26px;
    border-radius: 50%;
    background: var(--halo, #f3e6cf);
    filter: blur(34px);
    opacity: 0.85;
    z-index: 0;
  }
  .bag {
    position: relative;
    z-index: 1;
    width: 200px; height: 200px;
    border-radius: 36px;
    display: grid;
    place-items: center;
    background: #ffffff;
    box-shadow: var(--shadow-lift);
    transition: transform 0.6s cubic-bezier(.2,.8,.2,1);
    overflow: hidden;
  }
  .bag img {
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 14px;
  }
  .bag-halo::before { animation: haloPulse 4.2s ease-in-out infinite; }
  .bag { animation: floaty 4.5s ease-in-out 0.6s infinite; }
  @keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes haloPulse { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.07); } }

  .result-name {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .result-roast {
    display: inline-block;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 6px 16px;
    margin-bottom: 24px;
  }
  .result-notes {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 26px;
  }
  .note-chip {
    font-size: 15px;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 100px;
  }
  .result-blurb {
    font-size: 17px;
    line-height: 1.6;
    color: var(--ink-soft);
    max-width: 460px;
    margin: 0 auto 28px;
  }
  .price-pill {
    display: inline-block;
    font-size: 14px;
    font-weight: 600;
    color: var(--gold);
    background: #fff;
    border: 1px solid rgba(183,121,46,0.3);
    border-radius: 100px;
    padding: 6px 16px;
    margin-left: 8px;
  }
  .accordion {
    max-width: 480px;
    margin: 0 auto 32px;
    text-align: left;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .acc-item + .acc-item { border-top: 1px solid var(--line); }
  .acc-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    user-select: none;
    transition: background 0.2s ease;
  }
  .acc-head:hover { background: #faf7f2; }
  .acc-chevron { transition: transform 0.3s ease; color: var(--ink-soft); flex-shrink: 0; }
  .acc-item.open .acc-chevron { transform: rotate(180deg); }
  .acc-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.35s ease;
  }
  .acc-item.open .acc-body { grid-template-rows: 1fr; }
  .acc-body-inner { overflow: hidden; }
  .acc-body p {
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--ink-soft);
    padding: 0 20px 18px;
    margin: 0;
  }
  .cta {
    display: inline-block;
    background: linear-gradient(135deg, #c8893a 0%, #b7792e 55%, #9c6322 100%);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    text-decoration: none;
    padding: 17px 40px;
    border-radius: 100px;
    box-shadow: 0 10px 28px rgba(183, 121, 46, 0.38);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    transform-origin: center;
    animation: popIn 0.6s cubic-bezier(.2,.8,.2,1) 0.9s both, jiggle 3.2s ease-in-out 2.8s infinite;
  }
  .cta:hover {
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 16px 38px rgba(183, 121, 46, 0.5);
    animation: none;
  }
  @keyframes jiggle {
    0%, 88%, 100% { transform: translateY(0) rotate(0deg); }
    90% { transform: translateY(-2px) rotate(-2.2deg); }
    93% { transform: translateY(-2px) rotate(2.2deg); }
    96% { transform: translateY(-1px) rotate(-1.2deg); }
    98% { transform: translateY(0) rotate(0.6deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .cta { animation: none; }
  }
  .restart {
    display: block;
    margin: 22px auto 0;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .restart:hover { color: var(--ink); }

  /* Brew loader */
  .brew { text-align: center; padding-top: 24px; }
  .brew-cup { position: relative; display: flex; justify-content: center; margin: 0 auto 30px; padding-top: 28px; width: 90px; }
  .mug-wrap { position: relative; }
  .mug {
    width: 64px; height: 56px;
    border: 3px solid #4a3526;
    border-top: none;
    border-radius: 0 0 18px 18px;
    background: #fff;
    overflow: hidden;
    position: relative;
  }
  .mug .fill {
    position: absolute; left: 0; right: 0; bottom: 0; height: 0;
    background: linear-gradient(180deg, #9c6322, #5a3c1d);
    animation: fillup 1.8s cubic-bezier(.4,0,.4,1) forwards;
  }
  .handle {
    position: absolute; top: 8px; right: -15px;
    width: 15px; height: 24px;
    border: 3px solid #4a3526; border-left: none;
    border-radius: 0 10px 10px 0;
  }
  .steam { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); display: flex; gap: 9px; }
  .steam span {
    width: 5px; height: 20px; border-radius: 4px;
    background: linear-gradient(180deg, rgba(120,90,60,0), rgba(120,90,60,0.45));
    opacity: 0;
    animation: rise 1.9s ease-in-out infinite;
  }
  .steam span:nth-child(2) { animation-delay: 0.45s; }
  .steam span:nth-child(3) { animation-delay: 0.9s; }
  .brew-msg { font-size: 16px; font-weight: 600; color: var(--ink-soft); transition: opacity 0.18s ease; }
  @keyframes fillup { 0% { height: 0; } 100% { height: 100%; } }
  @keyframes rise {
    0% { opacity: 0; transform: translateY(8px) scaleY(0.6); }
    40% { opacity: 0.75; }
    100% { opacity: 0; transform: translateY(-18px) scaleY(1.3); }
  }

  /* Result cascade */
  .screen.result, .screen.result.active { transform: none; }
  .r-anim { opacity: 0; animation: popIn 0.6s cubic-bezier(.2,.8,.2,1) both; }
  .note-chip { animation: popIn 0.5s cubic-bezier(.2,.8,.2,1) both; }

  @keyframes popIn {
    0% { opacity: 0; transform: translateY(18px) scale(0.97); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    body::before, body::after, .bag, .bag-halo::before { animation: none; }
  }

  @media (max-width: 480px) {
    .q-title { font-size: 25px; }
    .result-name { font-size: 31px; }
    .opt { padding: 18px 18px; }
  }
</style>
</head>

const questions = [
  {
    kicker: "Question 1 of 3",
    title: "How do you like your roast?",
    options: [
      { label: "Light & bright", sub: "Crisp, fruity, lots of clarity", icon: "🌤", tint: "#fbeec2", scores: { ethiopia: 3, honduras: 1, tanzania: 1 } },
      { label: "Smooth & balanced", sub: "The everyday sweet spot", icon: "☕️", tint: "#f4d8c3", scores: { colombia: 2, guatemala: 2, mexico: 2, honduras: 2, tanzania: 2, espresso: 2 } },
      { label: "Bold & dark", sub: "Deep, rich, full-bodied", icon: "🌑", tint: "#dcc4a6", scores: { brazil: 3, halfcaf: 2, espresso: 1 } }
    ]
  },
  {
    kicker: "Question 2 of 3",
    title: "Which flavors pull you in?",
    options: [
      { label: "Fruity & floral", sub: "Berries, citrus, blossom", icon: "🌸", tint: "#f6cdd5", scores: { ethiopia: 3, tanzania: 2, honduras: 2 } },
      { label: "Chocolate & nutty", sub: "Cocoa, almond, comfort", icon: "🍫", tint: "#dcc4a6", scores: { brazil: 3, mexico: 2, espresso: 2, halfcaf: 2 } },
      { label: "Sweet & caramel", sub: "Toffee, brown sugar, smooth", icon: "🍮", tint: "#f4d8c3", scores: { colombia: 3, guatemala: 2, espresso: 1, decaf: 1 } },
      { label: "Bold & unexpected", sub: "Surprise me", icon: "✨", tint: "#d8cfe0", scores: { tanzania: 3, ethiopia: 1 } }
    ]
  },
  {
    kicker: "Question 3 of 3",
    title: "What's your coffee moment?",
    options: [
      { label: "A slow pour-over to savor", sub: "I taste every note", icon: "🫖", tint: "#d7ead0", scores: { ethiopia: 2, tanzania: 2, guatemala: 1 } },
      { label: "Everyday drip, all day", sub: "My reliable cup", icon: "🏠", tint: "#f4d8c3", scores: { colombia: 2, mexico: 2, honduras: 2, brazil: 1 } },
      { label: "Espresso & lattes", sub: "I want crema and body", icon: "🎯", tint: "#d9c3b0", scores: { espresso: 3, brazil: 1 } },
      { label: "Keep the caffeine low", sub: "Late nights, easy mornings", icon: "🌙", tint: "#cbdce8", scores: { decaf: 4, halfcaf: 3 } }
    ]
  }
];

// gentle priority to break ties toward flagship / popular coffees
const priority = { espresso: 6, ethiopia: 5, tanzania: 4, honduras: 3, colombia: 2, guatemala: 1 };

let step = 0;
const scores = {};
Object.keys(coffees).forEach(k => scores[k] = 0);

const stage = document.getElementById("stage");
const progress = document.getElementById("progress").children;

function setProgress() {
  for (let i = 0; i < progress.length; i++) {
    progress[i].classList.toggle("on", i <= step);
  }
}

function renderQuestion() {
  const q = questions[step];
  setProgress();
  const opts = q.options.map((o, i) => `
    <button class="opt" data-i="${i}" style="animation-delay:${0.06 + i * 0.07}s">
      <span class="opt-dot" style="background:${o.tint || '#f3e6cf'}">${o.icon}</span>
      <span class="opt-text">
        <span class="opt-label">${o.label}</span>
        <span class="opt-sub">${o.sub}</span>
      </span>
    </button>`).join("");

  stage.innerHTML = `
    <div class="screen" id="screen">
      <div class="q-kicker">${q.kicker}</div>
      <div class="q-title">${q.title}</div>
      <div class="options">${opts}</div>
    </div>`;

  const screen = document.getElementById("screen");
  requestAnimationFrame(() => screen.classList.add("active"));

  screen.querySelectorAll(".opt").forEach(btn => {
    btn.addEventListener("click", () => {
      const choice = q.options[+btn.dataset.i];
      for (const k in choice.scores) scores[k] += choice.scores[k];
      screen.classList.remove("active");
      setTimeout(() => {
        step++;
        if (step < questions.length) renderQuestion();
        else renderBrew();
      }, 380);
    });
  });
}

function renderBrew() {
  for (let i = 0; i < progress.length; i++) progress[i].classList.add("on");
  stage.innerHTML = `
    <div class="screen brew active" id="screen">
      <div class="brew-cup">
        <div class="steam"><span></span><span></span><span></span></div>
        <div class="mug-wrap"><div class="mug"><div class="fill"></div></div><div class="handle"></div></div>
      </div>
      <div class="brew-msg" id="brewMsg">Grinding the beans…</div>
    </div>`;
  const msgs = ["Grinding the beans…", "Heating the water…", "Pulling your match…"];
  let mi = 0;
  const el = document.getElementById("brewMsg");
  const iv = setInterval(() => {
    mi = (mi + 1) % msgs.length;
    el.style.opacity = 0;
    setTimeout(() => { el.textContent = msgs[mi]; el.style.opacity = 1; }, 180);
  }, 640);
  setTimeout(() => { clearInterval(iv); renderResult(); }, 2050);
}

function pickWinner() {
  let best = null, bestScore = -1, bestPri = -1;
  for (const k in scores) {
    const s = scores[k];
    const p = priority[k] || 0;
    if (s > bestScore || (s === bestScore && p > bestPri)) {
      best = k; bestScore = s; bestPri = p;
    }
  }
  return best;
}

function renderResult() {
  for (let i = 0; i < progress.length; i++) progress[i].classList.add("on");
  const key = pickWinner();
  const c = coffees[key];
  const m = meta[key];
  const chips = c.notes.map((n, i) => `<span class="note-chip" style="background:${c.color};color:${c.text};animation-delay:${0.5 + i * 0.08}s">${n}</span>`).join("");

  const sections = [
    ["Tasting notes", m.tasting],
    ["Elevation", m.elevation],
    ["Harvest season", m.harvest],
    ["Processing method", m.processing],
    ["Origin story", m.story]
  ];
  const chevron = '<svg class="acc-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>';
  const accordion = sections.map((s, i) => `
    <div class="acc-item${i === 0 ? ' open' : ''}">
      <div class="acc-head">${s[0]}${chevron}</div>
      <div class="acc-body"><div class="acc-body-inner"><p>${s[1]}</p></div></div>
    </div>`).join("");

  stage.innerHTML = `
    <div class="screen result" id="screen">
      <div class="result-kicker r-anim" style="animation-delay:0.05s">Your perfect match</div>
      <div class="bag-halo r-anim" style="--halo:${c.color};animation-delay:0.12s"><div class="bag"><img src="${c.img}" alt="${c.name} coffee bag"></div></div>
      <div class="result-name r-anim" style="animation-delay:0.26s">${c.name}</div>
      <div class="r-anim" style="animation-delay:0.34s">
        <span class="result-roast">${c.roast}</span>
        <span class="price-pill">From $${m.price}</span>
      </div>
      <div class="result-notes">${chips}</div>
      <p class="result-blurb r-anim" style="animation-delay:0.7s">${c.blurb}</p>
      <div class="accordion r-anim" style="animation-delay:0.8s">${accordion}</div>
      <a class="cta" href="${BASE}${c.handle}">Shop ${c.name} →</a>
      <button class="restart r-anim" style="animation-delay:0.98s" id="restart">Start over</button>
    </div>`;

  const screen = document.getElementById("screen");
  requestAnimationFrame(() => screen.classList.add("active"));

  screen.querySelectorAll(".acc-head").forEach(head => {
    head.addEventListener("click", () => head.parentElement.classList.toggle("open"));
  });

  document.getElementById("restart").addEventListener("click", () => {
    step = 0;
    Object.keys(scores).forEach(k => scores[k] = 0);
    renderQuestion();
  });
}

renderQuestion();
</script>
